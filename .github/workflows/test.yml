name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # No lockfile is committed (see .gitignore), so use `npm install`.
      - name: Install
        run: npm install

      - name: Build UMD bundle
        run: npm run build

      - name: Test
        run: npm test
